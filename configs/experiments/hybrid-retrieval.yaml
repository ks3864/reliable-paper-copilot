experiment:
  name: hybrid-retrieval-eval
  pipeline_version: phase4-hybrid-retrieval-v1
  description: Evaluate chunking-v2 with reciprocal-rank-fusion hybrid retrieval enabled.

retrieval:
  embedding_model: all-MiniLM-L6-v2
  chunk_profile: chunking-v2
  mode: hybrid
  dense_weight: 1.0
  lexical_weight: 1.0
  rrf_k: 60

answering:
  generator: simple
  judge: mock

evaluation:
  top_k: 5
  use_answer_quality_judge: true
